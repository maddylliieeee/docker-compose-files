services:
  mongo:
    image: mongo:3.6
    container_name: unifi_mongo
    networks:
      - unifi_net
    restart: always
    volumes:
      - /opt/unifi/mongo/data/db:/data/db
      - /opt/unifi/mongo/config:/data/configdb
  
  controller:
    image: jacobalberty/unifi:v10.0.162
    container_name: unifi_controller
    depends_on:
      - mongo
    init: true
    networks:
      - unifi_net
      - proxy_net
    restart: always
    volumes:
      - /opt/unifi/controller:/unifi
      - /opt/unifi/controller/data:/unifi/data
      - /opt/unifi/controller/log:/unifi/log
      - /opt/unifi/controller/cert:/unifi/cert
      - /opt/unifi/controller/init:/unifi/init.d
      - /opt/unifi/controller/run:/var/run/unifi
      # Mount local folder for backups and autobackups
      # - ./backup:/unifi/data/backup
    user: unifi
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 0
    environment:
      DB_URI: mongodb://mongo/unifi
      STATDB_URI: mongodb://mongo/unifi_stat
      DB_NAME: unifi
    ports:
      - "3478:3478/udp" # STUN
      - "6789:6789/tcp" # Speed test
      - "8080:8080/tcp" # Device/ controller comm.
      - "8443:8443/tcp" # Controller GUI/API as seen in a web browser
      - "8880:8880/tcp" # HTTP portal redirection
      - "8843:8843/tcp" # HTTPS portal redirection
      - "10001:10001/udp" # AP discovery
  
  logs:
    image: bash
    container_name: unifi_logs
    depends_on:
      - controller
    command: bash -c 'tail -F /unifi/log/*.log'
    restart: always
    volumes:
      - /opt/unifi/controller/log:/unifi/log

networks:
  unifi_net:
    name: unifi_net
    external: true
  proxy_net:
    name: proxy_net
    external: true